name: Daily Message

on:
  schedule:
    - cron: '*/30 * * * *'   # 30分おき polling: JST 時刻から slot 自動判定 (re-registered)
  workflow_dispatch:
    inputs:
      slot:
        description: "生成するスロット (morning/noon/night/all)"
        required: true
        type: choice
        options:
          - morning
          - noon
          - night
          - all
      memo:
        description: "実行メモ"
        required: false

permissions: {}

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Determine slot
        id: slot
        env:
          SLOT_INPUT: ${{ inputs.slot }}
        run: |
          if [ -n "$SLOT_INPUT" ]; then
            echo "value=$SLOT_INPUT" >> "$GITHUB_OUTPUT"
            echo "is_backfill=false" >> "$GITHUB_OUTPUT"
            echo "skip=false" >> "$GITHUB_OUTPUT"
          else
            # JST 時刻から slot 自動判定。
            # 06:00-11:59 = morning / 12:00-17:59 = noon / 18:00-23:59 = night
            # 00:00-05:59 = skip (この時間帯は polling 不要)
            # 各 slot 最終 30分 (11:30/17:30/23:30 JST 以降) は is_backfill=true、
            # 失敗時 email 通知 (最後の砦)。
            HM_JST=$(TZ=Asia/Tokyo date +%H%M)
            HM_NUM=$((10#$HM_JST))
            SKIP=false
            BACKFILL=false
            if [ "$HM_NUM" -ge 600 ] && [ "$HM_NUM" -lt 1200 ]; then
              SLOT="morning"
              [ "$HM_NUM" -ge 1130 ] && BACKFILL=true
            elif [ "$HM_NUM" -ge 1200 ] && [ "$HM_NUM" -lt 1800 ]; then
              SLOT="noon"
              [ "$HM_NUM" -ge 1730 ] && BACKFILL=true
            elif [ "$HM_NUM" -ge 1800 ]; then
              SLOT="night"
              [ "$HM_NUM" -ge 2330 ] && BACKFILL=true
            else
              SLOT="skip"
              SKIP=true
            fi
            echo "value=$SLOT" >> "$GITHUB_OUTPUT"
            echo "is_backfill=$BACKFILL" >> "$GITHUB_OUTPUT"
            echo "skip=$SKIP" >> "$GITHUB_OUTPUT"
            echo "Detected slot=$SLOT, backfill=$BACKFILL, skip=$SKIP (JST=$HM_JST)"
          fi

      - name: Generate daily message
        if: steps.slot.outputs.skip != 'true'
        env:
          IS_BACKFILL: ${{ steps.slot.outputs.is_backfill }}
        run: |
          SLOT="${{ steps.slot.outputs.value }}"
          API_URL="${{ secrets.VERCEL_APP_URL }}/api/cron/daily-message"
          AUTH="Authorization: Bearer ${{ secrets.CRON_SECRET }}"

          # In-workflow retry: 3 attempts with 0s / 60s / 180s back-off (max ~4min).
          # Captures transient Gemini 5xx without waiting for next 30min poll.
          # API 冪等性で (date, slot) 既存なら "skipped" を 200 で返す → 重複生成なし。
          generate_with_retry() {
            local target_slot=$1
            local attempt wait_sec
            for attempt in 1 2 3; do
              if [ "$attempt" -gt 1 ]; then
                case "$attempt" in
                  2) wait_sec=60 ;;
                  3) wait_sec=180 ;;
                esac
                echo "::notice::$target_slot retry attempt $attempt after ${wait_sec}s..."
                sleep "$wait_sec"
              fi
              RESPONSE=$(curl -sS --max-time 90 -w "\n%{http_code}" "$API_URL?slot=$target_slot" -H "$AUTH")
              HTTP_CODE=$(echo "$RESPONSE" | tail -1)
              BODY=$(echo "$RESPONSE" | sed '$d')
              echo "[$target_slot attempt $attempt] HTTP $HTTP_CODE: $BODY"
              LAST_HTTP_CODE=$HTTP_CODE
              if [ "$HTTP_CODE" -lt 400 ] || [ "$HTTP_CODE" = "429" ]; then
                echo "✅ $target_slot done (attempt $attempt)"
                return 0
              fi
            done
            return 1
          }

          if [ "$SLOT" = "all" ]; then
            # workflow_dispatch slot=all: 3スロット全部呼ぶ (API 冪等性で既存はskip)
            echo "Running backfill for all slots..."
            FAILED=0
            for S in morning noon night; do
              echo "--- $S ---"
              if ! generate_with_retry "$S"; then
                echo "::warning::$S failed after 3 attempts (last HTTP $LAST_HTTP_CODE)"
                FAILED=$((FAILED + 1))
              fi
            done
            if [ "$FAILED" -eq 3 ]; then
              echo "::error::All slots failed after retries"
              exit 1
            fi
          else
            # 単一スロットモード (30分polling / workflow_dispatch)
            echo "Generating $SLOT message... (is_backfill=$IS_BACKFILL)"
            if ! generate_with_retry "$SLOT"; then
              if [ "$IS_BACKFILL" = "true" ]; then
                # slot ウィンドウ最終 30分の最後の砦 → メール通知
                echo "::error::Daily message generation failed ($SLOT, last-30min backfill) after 3 attempts (last HTTP $LAST_HTTP_CODE)"
                exit 1
              else
                # 通常 polling 失敗 → warning のみ (次の30分poll が拾う)
                echo "::warning::$SLOT failed after 3 attempts (last HTTP $LAST_HTTP_CODE) — next 30min poll will retry"
              fi
            fi
          fi
