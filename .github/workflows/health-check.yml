name: Member Pipeline Health Check

on:
  schedule:
    - cron: "7 * * * *"
  workflow_dispatch:
    inputs:
      force_test_alert:
        description: "1 でアラート経路(issue+メール)を合成失敗で検証"
        required: false
        default: "0"

permissions:
  contents: read
  actions: read

concurrency:
  group: health-check
  cancel-in-progress: false

jobs:
  probe:
    runs-on: ubuntu-latest
    env:
      VERCEL_PROXY_URL: https://minami-baseball-ob.vercel.app/api/gas-proxy/dispatch
      OWNER: yasumorishima
      PROBE_REPO: minami-public-cron
      # Threshold for GAS heartbeat freshness (seconds). cron is hourly so allow up to 2h tolerance.
      GAS_HEARTBEAT_MAX_AGE_SEC: 7800
    steps:
      - name: Probe Vercel proxy with health-check dispatch
        env:
          GAS_WEBHOOK_SECRET: ${{ secrets.GAS_WEBHOOK_SECRET }}
        run: |
          set -euo pipefail
          payload=$(jq -nc \
            --arg secret "$GAS_WEBHOOK_SECRET" \
            --arg ts "$(date -u +%FT%TZ)" \
            '{secret:$secret, event_type:"health-check", client_payload:{source:"public-cron-health-check", at:$ts}}')
          http=$(echo "$payload" | curl --max-time 20 -sS -o /tmp/probe-body -w "%{http_code}" \
            -X POST "$VERCEL_PROXY_URL" \
            -H "Content-Type: application/json" \
            --data @-)
          echo "vercel_proxy_http=$http"
          head -c 500 /tmp/probe-body || true
          echo ""
          if [ "$http" != "200" ]; then
            echo "::error::Vercel proxy returned HTTP $http (expected 200). Pipeline likely broken: GAS_WEBHOOK_SECRET mismatch, App token, or proxy down."
            exit 1
          fi

      - name: Wait for dispatch to land
        run: sleep 45

      - name: Verify health-check-ack workflow ran within last 5 minutes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          # Get most recent health-check-ack run with action=health-check
          latest=$(gh api "repos/${OWNER}/${PROBE_REPO}/actions/workflows/health-check-ack.yml/runs?event=repository_dispatch&per_page=10" \
            --jq '[.workflow_runs[] | select(.display_title=="health-check" or .name=="Health Check Ack")] | .[0]')
          if [ -z "$latest" ] || [ "$latest" = "null" ]; then
            echo "::error::No health-check-ack run found at all (workflow not installed?)."
            exit 1
          fi
          created_at=$(echo "$latest" | jq -r '.created_at')
          run_age_sec=$(( $(date -u +%s) - $(date -u -d "$created_at" +%s) ))
          echo "latest_ack_created_at=$created_at age_sec=$run_age_sec"
          if [ "$run_age_sec" -gt 600 ]; then
            echo "::error::Latest health-check-ack ran $run_age_sec seconds ago (>10min). dispatch chain likely broken."
            exit 1
          fi

      - name: Verify GAS heartbeat freshness (gas-heartbeat-ack)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          # Latest run from action=gas-heartbeat
          latest=$(gh api "repos/${OWNER}/${PROBE_REPO}/actions/workflows/health-check-ack.yml/runs?event=repository_dispatch&per_page=30" \
            --jq '[.workflow_runs[] | select(.display_title=="gas-heartbeat")] | .[0]')
          if [ -z "$latest" ] || [ "$latest" = "null" ]; then
            echo "::warning::No gas-heartbeat run ever seen yet (GAS trigger may not be installed). Skipping freshness check."
            exit 0
          fi
          created_at=$(echo "$latest" | jq -r '.created_at')
          age_sec=$(( $(date -u +%s) - $(date -u -d "$created_at" +%s) ))
          echo "latest_gas_heartbeat=$created_at age_sec=$age_sec threshold=$GAS_HEARTBEAT_MAX_AGE_SEC"
          if [ "$age_sec" -gt "$GAS_HEARTBEAT_MAX_AGE_SEC" ]; then
            echo "::error::GAS heartbeat is $age_sec seconds old (>${GAS_HEARTBEAT_MAX_AGE_SEC}s). GAS time trigger may be silently dead (OAuth scope failure pattern)."
            exit 1
          fi

      - name: Probe gas-issue-form (feedback Gmail path) secret match
        env:
          GAS_WEBHOOK_URL: ${{ secrets.GAS_WEBHOOK_URL }}
          GAS_WEBHOOK_SECRET: ${{ secrets.GAS_WEBHOOK_SECRET }}
        run: |
          set -uo pipefail
          # Send approval-notify with missing `to` field. Expected response: "to required"
          # (secret matched, missing param). "unauthorized" body = secret mismatch.
          payload=$(jq -nc --arg secret "$GAS_WEBHOOK_SECRET" '{secret:$secret, action:"approval-notify"}')
          # gas-issue-form は deprecated な Google ホストの Web App で、単発の接続 transient
          # (curl timeout / 5xx / 一時的 404) が起きる。これは admin に対処不能なので、内側 GAS
          # probe と同様「一過性は無音、本物 (secret 不一致) だけ通知」にする。
          # GAS Web Apps return 302 to a googleusercontent.com URL serving the stored response over GET.
          # curl default (no -X POST): POST initial, auto-convert to GET on 302 redirect. 最大 3 回リトライ。
          http="000"; body=""
          for attempt in 1 2 3; do
            http=$(echo "$payload" | curl --max-time 25 -sS -L -o /tmp/issueform-body -w "%{http_code}" \
              "$GAS_WEBHOOK_URL" \
              -H "Content-Type: application/json" \
              --data-binary @-) || http="000"
            body=$(head -c 500 /tmp/issueform-body 2>/dev/null || true)
            echo "issueform attempt=$attempt http=$http body=$body"
            # 成功 (secret 一致) か authoritative な secret 不一致が出たら確定、リトライ打ち切り。
            if [ "$http" = "200" ] && echo "$body" | grep -q "to required"; then break; fi
            if echo "$body" | grep -q "unauthorized"; then break; fi
            if [ "$attempt" -lt 3 ]; then sleep $((attempt * 3)); fi
          done
          # 本物の障害: secret ドリフト (admin が対処すべき) → hard fail + メール。
          if echo "$body" | grep -q "unauthorized"; then
            echo "::error::gas-issue-form returned unauthorized — WEBHOOK_SECRET drifted from Vercel FEEDBACK_GAS_SECRET. /feedback creates GitHub issue but Gmail notification silently dropped."
            exit 1
          fi
          # 正常: secret 一致・想定どおり param 欠落。
          if [ "$http" = "200" ] && echo "$body" | grep -q "to required"; then
            echo "gas-issue-form OK (secret matched)"
            exit 0
          fi
          # それ以外 (timeout / 接続失敗 / 非200 / 想定外 body) は deprecated webapp の Google 側
          # 一過性とみなし warning のみ (ジョブを落とさない = メール抑制)。secret 不一致は上で hard fail 済。
          echo "::warning::gas-issue-form probe non-authoritative after 3 attempts (http=$http body=$body) — likely transient Google-side unavailability on the deprecated Web App; not failing the job."

      - name: Checkout (pipeline health script)
        if: ${{ !cancelled() }}
        uses: actions/checkout@v4

      - name: Mint App token for failure alerting
        if: ${{ !cancelled() }}
        id: alert-app
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: ${{ env.OWNER }}
          repositories: minami-baseball-ob

      - name: Detect member-pipeline workflow failures and alert
        if: ${{ !cancelled() }}
        env:
          PROBE_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APP_TOKEN: ${{ steps.alert-app.outputs.token }}
          GAS_WEBHOOK_URL: ${{ secrets.GAS_WEBHOOK_URL }}
          GAS_WEBHOOK_SECRET: ${{ secrets.GAS_WEBHOOK_SECRET }}
          HEALTHCHECK_FORCE_TEST: ${{ github.event.inputs.force_test_alert }}
        run: python3 scripts/check-pipeline-health.py
